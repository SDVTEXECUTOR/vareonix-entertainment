<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VAREONIX ENTERTAINMENT</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1a0a2e, #0d0d1a);
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 1rem;
        }

        .container {
            text-align: center;
            padding: 3rem 2.5rem;
            border-radius: 2.5rem;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.10);
            box-shadow: 0 25px 50px -10px rgba(0, 0, 0, 0.8);
            max-width: 700px;
            width: 100%;
        }

        .title {
            font-size: clamp(2.2rem, 8vw, 4.2rem);
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f5e56b, #f9d423, #ffb347);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 30px rgba(249, 212, 35, 0.25);
            margin-bottom: 1.2rem;
            line-height: 1.2;
        }

        .star {
            display: inline-block;
            animation: pulse 2s infinite alternate ease-in-out;
        }

        @keyframes pulse {
            0%   { transform: scale(1); }
            100% { transform: scale(1.2); }
        }

        .player-label {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 1.8rem;
            border-top: 1px solid rgba(255, 255, 255, 0.06);
            padding-top: 1.2rem;
            font-weight: 300;
        }

        audio {
            width: 100%;
            max-width: 480px;
            border-radius: 60px;
            background: rgba(255, 255, 255, 0.05);
            padding: 0.4rem;
            outline: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            display: block;
            margin: 0 auto;
        }

        audio::-webkit-media-controls-panel {
            background: rgba(20, 10, 40, 0.85);
            border-radius: 60px;
        }

        audio::-webkit-media-controls-play-button {
            background-color: #f9d423;
            border-radius: 50%;
        }

        .credit {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
        }

        /* Thông báo lỗi – hiện rõ khi không tìm thấy file */
        #error-msg {
            margin-top: 1.5rem;
            padding: 0.8rem 1rem;
            background: rgba(255, 70, 70, 0.15);
            border-left: 4px solid #ff4d4d;
            color: #ffb3b3;
            border-radius: 8px;
            font-size: 0.95rem;
            display: none;
            text-align: left;
        }

        #error-msg.show {
            display: block;
        }

        @media (max-width: 480px) {
            .container {
                padding: 2rem 1.2rem;
                border-radius: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="title">
            <span class="star">⭐</span> VAREONIX ENTERTAINMENT
        </h1>

        <div class="player-label">✦ Now Playing ✦</div>

        <!-- Audio với đường dẫn đúng tên file -->
        <audio id="audioPlayer" controls autoplay>
            <source src="music/FALL_IN_LOVE.mp3" type="audio/mpeg" />
            Trình duyệt của bạn không hỗ trợ thẻ audio.
        </audio>

        <!-- Vùng hiển thị lỗi -->
        <div id="error-msg">
            ⚠️ <strong>Không tìm thấy file nhạc.</strong><br />
            Hãy đảm bảo thư mục <code>music</code> nằm cùng cấp với <code>index.html</code> và bên trong có file <code>FALL_IN_LOVE.mp3</code>.
        </div>

        <div class="credit">🎵 FALL IN LOVE &bull; VAREONIX</div>
    </div>

    <script>
        (function() {
            const audio = document.getElementById('audioPlayer');
            const errorBox = document.getElementById('error-msg');

            // Khi có lỗi (không load được file)
            audio.addEventListener('error', function(e) {
                errorBox.classList.add('show');
                console.error('Lỗi audio:', audio.error);
                // Nếu lỗi là 404, có thể thử gợi ý kiểm tra đường dẫn
                if (audio.error && audio.error.code === 4) {
                    // MEDIA_ERR_SRC_NOT_SUPPORTED – thường do đường dẫn sai
                }
            });

            // Nếu file load thành công, ẩn thông báo lỗi (nếu đang hiện)
            audio.addEventListener('canplaythrough', function() {
                errorBox.classList.remove('show');
            });

            // Nếu autoplay bị chặn, người dùng vẫn bấm play được – không sao
            // Thêm dòng log để biết
            if (audio.autoplay) {
                console.log('🎵 Đang cố gắng tự động phát nhạc.');
            }
        })();
    </script>

</body>
</html>
